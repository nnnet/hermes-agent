name: sync-main

# Keep this fork's `main` an up-to-date mirror of upstream
# (NousResearch/hermes-agent) — entirely on GitHub, no external host.
#
# This workflow lives on `prod` (the fork's default branch) so GitHub arms its
# schedule. It ONLY syncs the `main` branch and never touches `prod`, so there
# is no conflict: `main` stays a clean upstream mirror, `prod` just carries this
# one workflow.
#
# Requires a repo secret FORK_SYNC_TOKEN: a PAT with the `workflow` scope
# (classic: scopes `repo` + `workflow`; or fine-grained on nnnet/hermes-agent
# with Contents: write AND Workflows: write). This is NOT optional: upstream's
# commits routinely change files under `.github/workflows/`, and GitHub refuses
# to let ANY token sync those without the `workflow` scope — the default
# GITHUB_TOKEN cannot have it, so both `git push` and `gh repo sync` fail with
# "Upstream commits contain workflow changes, which require the workflow scope".
# A PAT with that scope is the only way to mirror this particular upstream.

on:
  schedule:
    - cron: "17 * * * *"   # hourly at :17
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main from upstream
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          gh repo sync nnnet/hermes-agent \
            --source NousResearch/hermes-agent \
            --branch main
          echo "fork main synced to upstream/main"
