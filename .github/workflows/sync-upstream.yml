name: sync-upstream-to-main

# GitHub-native upstream mirror — runs entirely on GitHub Actions, no external
# host involved. Hard-mirrors NousResearch/hermes-agent main into THIS fork's
# main branch every hour, so fork main stays a zero-delta clean mirror of
# upstream and can never diverge (divergence is what froze updates before).
#
# This workflow lives on the fork's default branch (`prod`) so GitHub arms its
# schedule; it only ever writes the `main` branch, never `prod`. The default
# GITHUB_TOKEN has contents:write on this repo, so no PAT / external secret is
# needed.

on:
  schedule:
    # Hourly at :17 (off the :00 stampede). Upstream releases are infrequent;
    # the actual image rebuild stays manual via the dashboard Update button.
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-upstream-to-main
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Hard-mirror upstream/main into fork main (+ tags)
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch --no-tags upstream main
          git fetch upstream 'refs/tags/*:refs/tags/*'
          # Force the fork's main to exactly match upstream/main, then push.
          git reset --hard upstream/main
          git push origin HEAD:main --force
          git push origin --tags --force
          echo "fork main is now an exact mirror of upstream/main"
